<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>15 Signals</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream:     #F6F3EC;
      --ink:       #1B1B18;
      --ink-light: #5C5C52;
      --ink-faint: #9C9C8E;
      --border:    #D2CEC2;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--cream);
      font-family: 'EB Garamond', Georgia, serif;
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      font-feature-settings: "liga" 1, "kern" 1;
    }

    /* ── Scene system ── */
    .scene {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
    }

    /* ── Global header strip ── */
    .top-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
    }
    .logo {
      font-size: 10px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }
    .back-btn {
      position: absolute;
      left: 28px;
      font-family: 'EB Garamond', serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      pointer-events: auto;
      transition: color 0.15s;
    }
    .back-btn:hover { color: var(--ink); }

    /* ══════════════════════════════
       SCENE: SELECT
    ══════════════════════════════ */
    /* #sceneSelect initial state set via JS */

    .select-body {
      margin-top: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 44px;
    }
    .select-heading {
      text-align: center;
    }
    .select-heading h2 {
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 10px;
    }
    .select-heading p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 21px;
      color: var(--ink-light);
    }

    .phil-cards {
      display: flex;
      gap: 24px;
    }
    .phil-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 200px;
      padding: 28px 18px 22px;
      border: 1px solid var(--border);
      cursor: pointer;
      text-align: center;
      background: transparent;
      transition: border-color 0.2s, background 0.2s;
    }
    .phil-card:hover { border-color: var(--ink); background: rgba(27,27,24,0.025); }
    .phil-card svg { width: 80px; height: 100px; margin-bottom: 16px; }
    .phil-name {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 16px;
      margin-bottom: 4px;
    }
    .phil-years {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 12px;
    }
    .phil-rule { width: 18px; height: 1px; background: var(--border); margin: 0 auto 12px; }
    .phil-tagline {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 12.5px;
      line-height: 1.55;
      color: var(--ink-light);
    }

    /* ══════════════════════════════
       SCENE: DAILY OPENING（每日开场：抽象图 + 联想）
       —— 替换旧的 SIGNAL REVEAL 屏。旧类名 .signal-* 暂留以兼容。
    ══════════════════════════════ */
    #sceneSignal { gap: 0; justify-content: center; }
    .daily-col {
      max-width: 480px;
    }
    .daily-date {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 11.5px;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
      margin-bottom: 26px;
      text-align: left;
    }
    .daily-image {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-bottom: 36px;
    }
    .daily-image svg {
      width: 220px;
      height: auto;
      display: block;
      opacity: 0;
      animation: dailyFadeIn 1.6s cubic-bezier(0, 0, 0.25, 1) 0.3s forwards;
    }
    .daily-prompt {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 19px;
      line-height: 1.55;
      color: var(--ink);
      margin: 0 0 22px;
      text-align: left;
      opacity: 0;
      animation: dailyFadeIn 1.2s cubic-bezier(0, 0, 0.25, 1) 1.0s forwards;
    }
    .daily-col textarea {
      opacity: 0;
      animation: dailyFadeIn 0.9s cubic-bezier(0, 0, 0.25, 1) 1.6s forwards;
    }
    .daily-col .write-footer {
      opacity: 0;
      animation: dailyFadeIn 0.9s cubic-bezier(0, 0, 0.25, 1) 1.9s forwards;
    }
    @keyframes dailyFadeIn { to { opacity: 1; } }

    /* —— 旧的 SIGNAL REVEAL 类名（保留以备引用） —— */
    .signal-label {
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 40px;
    }
    .signal-list { display: none; }
    .signal-tag  { display: none; }

    /* ══════════════════════════════
       SHARED: DIALOGUE COLUMN
    ══════════════════════════════ */
    .dialogue-col {
      width: 100%;
      max-width: 540px;
      padding: 0 40px;
      display: flex;
      flex-direction: column;
    }
    .attr-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 26px;
    }
    .attr-thumb { width: 24px; height: 30px; flex-shrink: 0; opacity: 0.55; }
    .attr-name {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }
    .attr-count {
      margin-left: auto;
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--ink-faint);
    }

    /* ══════════════════════════════
       SCENE: GREETING
    ══════════════════════════════ */
    .greeting-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 23px;
      line-height: 1.82;
      color: var(--ink-light);
      white-space: pre-line;
    }
    .start-btn {
      margin-top: 38px;
      background: none; border: none;
      font-family: 'EB Garamond', serif;
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-faint);
      cursor: pointer;
      padding: 6px 0;
      opacity: 0;
      transition: color 0.15s;
      animation: pulse 2.6s ease-in-out infinite;
      align-self: flex-start;
    }
    .start-btn:hover { color: var(--ink); }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.85} }

    /* ══════════════════════════════
       SCENE: WRITING
    ══════════════════════════════ */
    #sceneWriting .dialogue-col { justify-content: center; }
    .prev-msg {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 17.5px;
      line-height: 1.68;
      color: var(--ink);
      opacity: 0.28;
      margin-bottom: 30px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
    }
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 0 0 12px;
      font-family: 'EB Garamond', serif;
      font-size: 25px;
      line-height: 1.72;
      color: var(--ink);
      resize: none; outline: none;
      caret-color: var(--ink);
      overflow: hidden;
      min-height: 50px;
    }
    textarea::placeholder { color: var(--ink-faint); font-style: italic; }
    textarea:disabled { opacity: 1; }
    /* 写作场景的输入线延迟出现——让用户先认真看完上文
       默认透明；进入场景 2.5s 后，由 JS 加 .line-shown 让它淡入 */
    #userInput {
      border-bottom-color: transparent;
      transition: border-bottom-color 1.2s ease;
    }
    #userInput.line-shown {
      border-bottom-color: var(--border);
    }
    .write-footer {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .write-hint { font-size: 10.5px; font-style: italic; color: var(--ink-faint); }

    /* 听写状态指示 */
    .dict-indicator {
      display: flex;
      align-items: center;
      gap: 9px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }
    .dict-indicator.active { opacity: 1; }
    .dict-label {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 12px;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
    }
    /* 听写时输入框底线呼吸 */
    @keyframes borderBreath {
      0%, 100% { border-bottom-color: var(--border); }
      50%       { border-bottom-color: var(--ink-light); }
    }
    textarea.dictating {
      animation: borderBreath 1.4s ease-in-out infinite;
    }
    .dissolve-hint {
      margin-top: 28px;
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 14px;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      opacity: 0;
      transition: opacity 0.6s ease;
      align-self: flex-start;
    }
    /* 发送按钮：朴素的"边框+悬停填充" */
    .submit-btn {
      font-family: 'EB Garamond', serif;
      font-size: 15px;
      line-height: 1;
      letter-spacing: 0.02em;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      padding: 10px 22px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
      transition: background 0.15s ease, color 0.15s ease, opacity 0.3s ease;
    }
    .submit-btn:hover { background: var(--ink); color: var(--cream); }
    .submit-btn:disabled {
      opacity: 0.18;
      cursor: default;
      pointer-events: none;
    }

    /* ══════════════════════════════
       SCENE: THINKING
    ══════════════════════════════ */
    #sceneThinking { gap: 0; }
    .dots { display: flex; gap: 8px; align-items: center; }
    .dots i {
      display: block; width: 5px; height: 5px;
      border-radius: 50%; background: var(--ink-faint);
      animation: breathe 1.6s ease-in-out infinite;
    }
    .dots i:nth-child(2) { animation-delay: 0.22s; }
    .dots i:nth-child(3) { animation-delay: 0.44s; }
    @keyframes breathe { 0%,100%{opacity:0.2;transform:scale(0.85)} 50%{opacity:1;transform:scale(1.15)} }

    /* ══════════════════════════════
       SCENE: RESPONSE
    ══════════════════════════════ */
    .resp-text {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 22px;
      line-height: 1.86;
      color: var(--ink-light);
      white-space: pre-line;
      max-height: 48vh;
      overflow: hidden;
    }
    .resp-more-hint {
      margin-top: 28px;
      background: none; border: none;
      font-family: 'EB Garamond', serif;
      font-size: 10px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-faint);
      cursor: pointer;
      padding: 4px 0;
      opacity: 0;
      transition: opacity 0.7s ease, color 0.15s;
      align-self: flex-start;
    }
    .resp-more-hint:hover { color: var(--ink); }
    .reply-btn {
      margin-top: 36px;
      background: none; border: none;
      font-family: 'EB Garamond', serif;
      font-size: 10.5px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-faint);
      cursor: pointer;
      padding: 6px 0;
      opacity: 0;
      transition: color 0.15s;
      align-self: flex-start;
    }
    .reply-btn:hover { color: var(--ink); }

    /* ── API Key area ── */
    .key-area {
      position: absolute;
      right: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
    }
    .key-status {
      font-size: 10px;
      letter-spacing: 0.14em;
      color: var(--ink-faint);
    }
    .key-btn {
      font-family: 'EB Garamond', serif;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink-faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }
    .key-btn:hover { color: var(--ink); }

    .user-email {
      font-family: 'EB Garamond', serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--ink-faint);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ══════════════════════════════
       SCENE: AUTH
    ══════════════════════════════ */
    #sceneAuth .auth-body {
      width: 360px;
      max-width: 88vw;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 28px;
    }
    .auth-heading { text-align: center; }
    .auth-heading h2 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: 26px;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .auth-heading p {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 14px;
      color: var(--ink-light);
      letter-spacing: 0.04em;
    }
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .auth-form input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      font-family: 'EB Garamond', serif;
      font-size: 16px;
      color: var(--ink);
      outline: none;
      letter-spacing: 0.04em;
      transition: border-color 0.2s;
    }
    .auth-form input::placeholder { color: var(--ink-faint); }
    .auth-form input:focus { border-bottom-color: var(--ink); }
    .auth-submit {
      margin-top: 12px;
      font-family: 'EB Garamond', serif;
      font-size: 10.5px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink);
      background: transparent;
      border: 1px solid var(--ink);
      padding: 10px 0;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
    }
    .auth-submit:hover { background: var(--ink); color: var(--cream); }
    .auth-submit:disabled { opacity: 0.4; cursor: default; }
    .auth-submit:disabled:hover { background: transparent; color: var(--ink); }
    .auth-toggle {
      align-self: center;
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--ink-faint);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 0;
      transition: color 0.15s;
    }
    .auth-toggle:hover { color: var(--ink); }
    .auth-error {
      font-family: 'EB Garamond', serif;
      font-size: 13px;
      color: #8B3A3A;
      letter-spacing: 0.02em;
      margin: 0;
    }
    .auth-note {
      font-family: 'EB Garamond', serif;
      font-style: italic;
      font-size: 13px;
      color: var(--ink-light);
      letter-spacing: 0.02em;
      margin: 0;
    }

    /* ══════════════════════════════
       AMBIENT SMOKE
    ══════════════════════════════ */
    .ambient-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 3;
    }

    /*
      燃香烟雾：从一个点缓慢升起，左右不规则摇摆，
      越升越散（scaleX 扩张），越散越模糊，最终消隐。
      translateX 故意用不对称的值，避免机械感。
    */
    /*
      烟雾：从小圆点升起，整体向四周膨胀扩散，
      越升越大越模糊，最终消散。
      用 scale(x,y) 双向膨胀而不是 scaleX，
      这样才像雾气，不像拉伸的线条。
    */
    @keyframes smokeRise {
      0%   { opacity: 0;    transform: translate(  0px,   0px) scale(1.0, 1.0); filter: blur(1px);   }
      12%  { opacity: 0.38; transform: translate(  3px, -10px) scale(1.4, 1.6); filter: blur(2px);   }
      30%  { opacity: 0.34; transform: translate( -5px, -22px) scale(2.2, 2.4); filter: blur(3px);   }
      52%  { opacity: 0.22; transform: translate(  4px, -35px) scale(3.2, 3.0); filter: blur(4px);   }
      75%  { opacity: 0.09; transform: translate( -2px, -47px) scale(4.2, 3.6); filter: blur(5px);   }
      100% { opacity: 0;    transform: translate(  1px, -58px) scale(5.0, 4.2); filter: blur(6px);   }
    }

    .amb {
      position: absolute;
      opacity: 0;
      animation-name: smokeRise;
      animation-iteration-count: infinite;
      animation-fill-mode: backwards;
      animation-timing-function: ease-out;
    }

    /* 起点：小椭圆，像一粒烟的源点 */
    .amb-smoke {
      width: 5px;
      height: 8px;
      border-radius: 50%;
      background: var(--ink);
      transform-origin: center center;
    }

    /* ── "想法的气泡"——内省产品的视觉锚 ──
       上方一团缓慢升起的雾（amb-smoke 粒子）= 想法本身
       下方由大到小的几颗气泡 = 朝观者方向收的"想法痕迹"
       不画任何具体物件——气泡的语言不需要落地。 */
    .ambient-anchor {
      position: absolute;
      right: 9%;
      bottom: 8%;
      width: 1px;
      height: 1px;
    }
    .thought-bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(92, 92, 82, 0.26) 0%,
        rgba(92, 92, 82, 0.08) 60%,
        rgba(92, 92, 82, 0) 100%);
      pointer-events: none;
      animation: bubbleBreath 6.4s ease-in-out infinite;
    }
    /* 三颗气泡：从近（大）到远（小），向下偏移
       —— 近端紧贴雾的下沿，远端淡入空无 */
    .bubble-near { width: 13px; height: 13px; left: -6.5px; bottom: 4px;   }
    .bubble-mid  { width: 9px;  height: 9px;  left: -4.5px; bottom: -10px; animation-delay: 1.6s; }
    .bubble-far  { width: 5px;  height: 5px;  left: -2.5px; bottom: -22px; animation-delay: 3.2s; }
    @keyframes bubbleBreath {
      0%, 100% { opacity: 0.85; transform: scale(1);    }
      50%      { opacity: 1.00; transform: scale(1.06); }
    }
    /* 小屏时再压低一档 */
    @media (max-width: 600px) {
      .ambient-anchor { right: 6%; bottom: 6%; }
      .thought-bubble { opacity: 0.78; }

      /* 顶栏：压缩元素，避免左右两侧与中央 logo 重叠 / 溢出 */
      .top-bar { height: 48px; }
      .back-btn { left: 14px; letter-spacing: 0.12em; }
      .key-area { right: 12px; gap: 8px; }
      .key-btn { letter-spacing: 0.12em; }
      /* 移动端隐藏信息性元素，仅保留可点击操作 */
      .user-email,
      .key-status { display: none !important; }

      /* 导师选择：手机上改为横向可滑动（避免纵向堆叠时高度超出视口、与顶栏重叠/被裁切） */
      .phil-cards {
        flex-direction: row;
        gap: 16px;
        width: 100vw;
        max-width: 100vw;
        overflow-x: auto;
        overflow-y: hidden;
        padding: 8px 24px;
        margin: 0 -24px; /* 抵消父容器 padding，确保两侧贴边可滑 */
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .phil-cards::-webkit-scrollbar { display: none; }
      .phil-card {
        flex: 0 0 auto;
        width: 220px;
        scroll-snap-align: center;
      }
      .select-body { gap: 32px; padding: 0 20px; width: 100%; }
    }
    /* 极窄屏（多按钮场景）：隐藏中央 logo，避免与两侧按钮重叠 */
    @media (max-width: 420px) {
      .logo { display: none; }
    }

    /* ══════════════════════════════
       HISTORY OVERLAY
    ══════════════════════════════ */
    #histOverlay {
      position: fixed;
      inset: 0;
      background: var(--cream);
      z-index: 50;
      overflow-y: auto;
      display: none;
      opacity: 0;
      transition: opacity 0.38s ease;
    }
    .hist-inner {

<body>

<!-- ══ Ambient: "想法的气泡" ══
     上方一团慢慢升起、消散的雾 = 想法本身；
     下方三颗由大到小的气泡 = 朝观者方向收的痕迹。
     不画器物，不写台词——纯视觉的"内省"暗号。 -->
<div class="ambient-layer" aria-hidden="true">
  <div class="ambient-anchor">
    <!-- 想法的痕迹：三颗由大到小、由近到远的气泡 -->
    <div class="thought-bubble bubble-near"></div>
    <div class="thought-bubble bubble-mid"></div>
    <div class="thought-bubble bubble-far"></div>
    <!-- 上方雾：4 缕慢升、扩散、化空——"想法本身"
         （bottom 范围 12–18px，紧贴 bubble-near 上沿之上） -->
    <div class="amb amb-smoke" style="left:-2.5px; bottom:14px; animation-duration:11.4s; animation-delay:0.0s;"></div>
    <div class="amb amb-smoke" style="left:-3.5px; bottom:18px; animation-duration:13.2s; animation-delay:3.6s;"></div>
    <div class="amb amb-smoke" style="left:-1.5px; bottom:12px; animation-duration:10.6s; animation-delay:6.8s;"></div>

/** 取今天的图：日期序号 mod 池大小 —— 同一天内任何场景拿到同一张。 */
function getTodayImage() {
  const now = new Date();
  const dayOfYear = Math.floor(
    (now - new Date(now.getFullYear(), 0, 0)) / 86400000
  );
  return {
    svg: DAILY_IMAGES[dayOfYear % DAILY_IMAGES.length],
    dateLabel: now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' })
  };
}

   避免前端的旧指令稀释或冲突后端正在打磨的对话风格。

  }
  return '用中文回应。' + contextHint;
}

// 对话历史持久化
//   - 远端（权威）：Supabase sessions/turns，通过 /api/session/{start,turn,turns} 读写
//   - 本地（缓存兼离线兜底）：localStorage conv_${philKey}
//   - 最多保留 30 条消息 = 15 轮对话
const HISTORY_LIMIT = 30;

function loadHistory(philKey) {
  try {
    return JSON.parse(localStorage.getItem(`conv_${philKey}`) || '[]');
  } catch { return []; }
}

function saveHistory(philKey, history) {
  const trimmed = history.slice(-HISTORY_LIMIT);
  localStorage.setItem(`conv_${philKey}`, JSON.stringify(trimmed));
}

function clearHistory(philKey) {
  localStorage.removeItem(`conv_${philKey}`);
}

/* ── 远端 API 辅助 ── */
async function authHeader() {
  const { data: { session } } = await supa.auth.getSession();
  if (!session) return null;
  return { 'Authorization': `Bearer ${session.access_token}` };
}

async function apiPost(path, body) {
  const auth = await authHeader();
  if (!auth) throw new Error('NOT_SIGNED_IN');
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...auth },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`POST ${path} ${res.status}: ${txt}`);
  }
  return res.json();
}

async function apiGet(path) {
  const auth = await authHeader();
  if (!auth) throw new Error('NOT_SIGNED_IN');
  const res = await fetch(path, { headers: auth });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`GET ${path} ${res.status}: ${txt}`);
  }
  return res.json();
}

// turns 表里 role 是 'user' | 'mentor'；本地 convHistory 沿用 OpenAI 风格 'user' | 'assistant'
const roleToServer  = r => (r === 'assistant' ? 'mentor' : r);
const roleFromServer = r => (r === 'mentor' ? 'assistant' : r);

async function callDeepSeek(userMsg, philKey) {
  // 拿 Supabase 当前用户的 access_token，由 /api/deepseek 校验后再转发到上游
  const { data: { session } } = await supa.auth.getSession();
  if (!session) throw new Error('NOT_SIGNED_IN');

  const messages = [
    { role: 'system', content: buildSystemPrompt(philKey) },
    ...convHistory,
    { role: 'user', content: userMsg }
  ];
  const res = await fetch(DS.endpoint, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${session.access_token}`
    },
    body: JSON.stringify({ model: DS.model, messages, max_tokens: 400, temperature: 0.85 })
  });
  if (!res.ok) throw new Error(`API ${res.status}`);
  const data = await res.json();
  const reply = data.choices[0].message.content.trim();
  convHistory.push({ role: 'user', content: userMsg }, { role: 'assistant', content: reply });
  saveHistory(philKey, convHistory);

  // 远端：把这一对 turn 写到 sessions/turns（best-effort，不阻塞 UX）
  if (currentSessionId) {
    apiPost('/api/session/turn', {
      session_id: currentSessionId,
      turns: [
        { role: 'user',   content: userMsg },
        { role: 'mentor', content: reply   },
      ]
    }).catch(err => {
      console.warn('[session/turn] 远端写入失败，本地缓存仍保留', err);
    });
  }

  return reply;
}

// 4 个角色 × 各自的 4 个时段。区间用整数小时（左闭右开），跨午夜的段用 wrap 标记。
const ROLE_BUCKETS = {
  whitecollar: [
    { id: 'pre_work',  label: '上班前',     start: 5,  end: 9  },
    { id: 'at_work',   label: '上班中',     start: 9,  end: 18 },

    { id: 'late',      label: '深夜',       wrap: true, start: 23, end: 5 },
  ],
  student: [
    { id: 'route',       label: '上学路上',     start: 6,  end: 8  },
    { id: 'school',      label: '校园中',       start: 8,  end: 17 },
    { id: 'post_school', label: '放学后',       start: 17, end: 21 },
    { id: 'late_study',  label: '夜自习/失眠', wrap: true, start: 21, end: 6 },
  ],
  freelance: [
    { id: 'morning', label: '早晨',     start: 6,  end: 10 },
    { id: 'work',    label: '工作时段', start: 10, end: 18 },
    { id: 'evening', label: '傍晚',     start: 18, end: 22 },
    { id: 'late',    label: '深夜',     wrap: true, start: 22, end: 6 },
  ],
  other: [
    { id: 'dawn',      label: '清晨', start: 5,  end: 9  },
    { id: 'morning',   label: '上午', start: 9,  end: 12 },
    { id: 'afternoon', label: '下午', start: 12, end: 18 },
    { id: 'evening',   label: '夜里', wrap: true, start: 18, end: 5 },
  ],
};

};

function todayDateKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

/** 返回 'whitecollar' | 'student' | 'freelance' | 'other' | null（null = 今天还没选或跳过了） */
function getDailyRole() {
  const date = localStorage.getItem('daily_role_date');
  if (date !== todayDateKey()) return null;
  const role = localStorage.getItem('daily_role');
  return role || null;
}

function setDailyRole(role /* string | null */) {
  if (role) localStorage.setItem('daily_role', role);
  else      localStorage.removeItem('daily_role');
  localStorage.setItem('daily_role_date', todayDateKey());
}

/** 当前 bucket 信息 {id, label} 或 null。role 未知则返回 null。 */
function currentBucket(role) {
  if (!role || !ROLE_BUCKETS[role]) return null;
  const h = new Date().getHours();
  for (const b of ROLE_BUCKETS[role]) {
    if (b.wrap) {
      if (h >= b.start || h < b.end) return { id: b.id, label: b.label };
    } else if (h >= b.start && h < b.end) {
      return { id: b.id, label: b.label };
    }
  }
  return null;
}

/** mentor + role + bucket → 短句（Weber 已全填；Freud / Marx 暂未填则返回 null，平稳降级。） */
function getPreamble(philKey, role, bucketId) {
  if (!role || !bucketId) return null;
  const p = P[philKey] && P[philKey].preambles;
  if (!p || !p[role] || !p[role][bucketId]) return null;
  return p[role][bucketId];
}

async function startSession(philKey) {
  curPhil = philKey;
  sessionCount = 0;
  currentSessionId = null;

  // 1) 默认先用本地缓存填 convHistory，确保即便后端失联也能起步
  convHistory = loadHistory(philKey);

  // 2) 远端：拿 / 建一段活跃会话，并用它的 turns 覆盖本地缓存
  try {
    const started = await apiPost('/api/session/start', { mentor_id: philKey });
    currentSessionId = started.session_id;
    if (started.resumed && started.turn_count > 0) {
      const { turns } = await apiGet(`/api/session/turns?session_id=${currentSessionId}`);
      convHistory = (turns || []).map(t => ({
        role:    roleFromServer(t.role),
        content: t.content
      }));
      saveHistory(philKey, convHistory);  // 同步回本地缓存，保持一致
    } else if (!started.resumed) {
      // 新会话：清掉旧的本地缓存，避免上次未关闭的对话上下文混进来
      convHistory = [];
      saveHistory(philKey, convHistory);
    }
  } catch (err) {
    console.warn('[session/start] 远端失败，回退到本地 localStorage', err);
  }

  const hasMem = convHistory.length > 0;
  document.getElementById('clearMemBtn').style.display = hasMem ? 'block' : 'none';
  const d = P[philKey];

  // —— 准备每日开场画面（图按日期 mod 选定；同一天内任何会话都看到同一张）
  const today = getTodayImage();
  dailyImage.innerHTML = today.svg;
  dailyDate.textContent = today.dateLabel;
  // 清空上一次留下的输入（起点的纯净）
  dailyInput.value = '';
  dailyInput.style.height = 'auto';
  dailySubmitBtn.disabled = true;

  document.getElementById('backBtn').style.display = 'block';
  await go('sceneSignal', 600);

  // —— 给图与提示一段静态时间，让它先到达用户（CSS 里已排好渐入节奏：
  //     0.3s 图 / 1.0s 问句 / 1.6s 输入框 / 1.9s 提示与按钮）
  //     超过 2.4s 后焦点轻轻落到输入框，不催不急
  setTimeout(() => { if (curScene === 'sceneSignal') dailyInput.focus(); }, 2400);

  // —— 等用户写下今日联想并长按沉入。期间没有任何自动推进。
  const association = await waitForDailySubmit();
  if (association === null) return;   // 用户在 daily 场景按了返回，本次 session 结束
  // association 已存进 lastDailyAssociation，可在后续 LLM 调用里复用

  // —— 接下来仍然走原有的"哲学家迎接"——以便保留产品本来的诗意
  //     （后续可考虑让哲学家在 greeting 里呼应用户写下的联想）
  const sig = (d.signals[Math.floor(Math.random() * d.signals.length)]);
  const baseGreet = d.greetings[sig] || d.greetings.default;

  // —— 在 signal greeting 前拼一段「生活情境前奏」（按今日 role × 当前 bucket）
  //    Weber 已全套；Freud/Marx 还没填则降级为无前奏，体验不破。
  const role = getDailyRole();
  const bucket = currentBucket(role);
  const preamble = bucket && getPreamble(philKey, role, bucket.id);
  const greet = preamble ? `${preamble}\n\n${baseGreet}` : baseGreet;
  lastRespText = greet;

  document.getElementById('greetText').textContent = greet;
  document.getElementById('greetAttr').innerHTML =
    `${svgThumb(philKey)}<span class="attr-name">${d.short}</span>`;

  await go('sceneGreeting', 580);
  await pause(1000);
  document.getElementById('startBtn').style.opacity = '1';
}

// 从哲学家最后一段话里提取收尾疑问句，作为输入框提示
function extractInvitation(text) {
  if (!text) return null;
  // 按句末标点切开
  const sentences = text.split(/(?<=[。！？…])\s*/).map(s => s.trim()).filter(Boolean);
  // 从后往前找第一个含问号的句子
  for (let i = sentences.length - 1; i >= 0; i--) {
    const s = sentences[i];
    if (s.includes('？')) {
      // 去掉句首可能的破折号/空白，截短超长句
      const clean = s.replace(/^[—–\s]+/, '').trim();
      return clean.length > 46 ? clean.slice(0, 44) + '……' : clean;
    }
  }
  return null;
}

}

// 将回复切分为段落 chunks；过长的段落再按句号断开
function splitResponse(text) {
  const paras = text.split(/\n+/).map(s => s.trim()).filter(Boolean);
  const chunks = [];
  for (const para of paras) {
    if (para.length <= 170) {
      chunks.push(para);
    } else {
      // 按句末标点切分长段落
      const parts = para.split(/(?<=[。！？…])\s*/);
      let cur = '';
      for (const p of parts) {
        if (cur && (cur + p).length > 170) {
          chunks.push(cur.trim());
          cur = p;
        } else {
          cur += p;
        }
      }
      if (cur.trim()) chunks.push(cur.trim());
    }
  }
  return chunks.length ? chunks : [text];
}

// 展示下一个 chunk（带淡入淡出）
async function advanceRespChunk() {
  respChunkIdx++;
  const hasMore = respChunkIdx < respChunks.length - 1;

  // 淡出当前文字 + hint
  css(respEl,    { transition: 'opacity 0.45s ease, filter 0.45s ease', opacity: '0', filter: 'blur(5px)' });
  css(moreHint,  { transition: 'opacity 0.25s ease', opacity: '0' });
  await pause(480);

  respEl.textContent = respChunks[respChunkIdx];

  // 淡入新文字
  requestAnimationFrame(() => requestAnimationFrame(() => {
    css(respEl, {
      transition: 'opacity 1.5s cubic-bezier(0,0,0.25,1), filter 1.5s cubic-bezier(0,0,0.25,1)',
      opacity: '1', filter: 'blur(0px)'
    });
  }));

  await pause(1800);

  if (hasMore) {
    css(moreHint, { transition: 'opacity 0.8s ease', opacity: '1' });
  } else {
    css(replyBtn, { transition: 'opacity 0.9s ease', opacity: '1' });
    // 翻到最后一段时也要露出"结束对话"——和 submitFlow 的尾段逻辑保持一致
    if (sessionCount >= 1) {
      css(document.getElementById('endBtn'), { transition: 'opacity 1.4s ease 0.6s', opacity: '0.85' });
    }
  }
}

moreHint.addEventListener('click', () => {
  if (respChunkIdx < respChunks.length - 1) advanceRespChunk();
});

async function submitFlow() {
  const q = input.value.trim();
  if (!q) return;
  submitBtn.disabled = true;
  sessionCount++;

  // Dissolve input + 显示停顿提示
  const hint = document.getElementById('dissolveHint');
  css(input, {
    transition: 'opacity 1.3s cubic-bezier(0.4,0,1,1), filter 1.3s cubic-bezier(0.4,0,1,1)',
    opacity: '0', filter: 'blur(9px)'
  });
  await pause(500);
  hint.style.opacity = '1';
  await pause(900);
  hint.style.opacity = '0';
  css(input, { transition: 'none', opacity: '1', filter: 'blur(0px)' });
  input.value = ''; input.style.height = 'auto';

  // Thinking scene
  const d = P[curPhil];
  await go('sceneThinking', 400);

  // 调用 DeepSeek API（thinking 场景自然等待 LLM 响应）
  let text;
  try {
    text = await callDeepSeek(q, curPhil);
  } catch (err) {
    if (err.message === 'NO_KEY') {
      text = '请先在页面顶部设置你的 DeepSeek API Key。';
    } else {
      text = `连接失败（${err.message}）。请检查网络或 API Key 是否有效。`;
    }
  }
  lastRespText = text;

  document.getElementById('respAttr').innerHTML = `
    ${svgThumb(curPhil)}
    <span class="attr-name">${d.name}</span>
    <span class="attr-count">第 ${sessionCount} 轮</span>
  `;

  // 切分 chunks，展示第一段
  respChunks    = splitResponse(text);
  respChunkIdx  = 0;
  const hasMore = respChunks.length > 1;

      opacity: '1', filter: 'blur(0px)'
    });
  }));

  await pause(2200);

    if (sessionCount >= 1) {

  // 直到用户重新输入内容
  submitBtn.disabled = !input.value.trim();

/* ── 发送绑定（可复用工厂）────────────────────────────────
   交互契约（已回归朴素）：
   1. 输入框默认空，永不预填——起点的纯净。
      ⚠ 这条最容易被违反：placeholder 也算预填。
        无论"对方的问句""产品的诗意邀请"还是任何完整句子，
        都不可以出现在输入框里。占位 = 替用户开口。
        最多用极短的中性提示（"……"或干脆 ""），不可用整句。
   2. 发送 = 点击 ↓ 按钮，或按 Enter。
   3. Enter 不换行——每条消息是一个完整的念头，不分段。
   4. 例外：IME 拼音选词 / 听写期间 Enter 仍交还给系统（必需）。
─────────────────────────────────────────────────────────── */
function bindEnterSend({ button, input: inp, onSubmit }) {
  function submit() {
    if (button.disabled) return;
    if (!inp.value.trim()) return;
    onSubmit();
  }

  // 点击按钮 = 发送
  button.addEventListener('click', submit);

  // Enter = 发送（拼音/听写期间例外）
  inp.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    if (e.isComposing) return;
    if (inp.classList.contains('dictating')) return;
    e.preventDefault();
    submit();
  });

  // 输入为空 → 按钮自动禁用
  inp.addEventListener('input', () => {
    button.disabled = !inp.value.trim();
  });
  button.disabled = !inp.value.trim();
}

const REVIEW_ENDPOINT = (() => {

               || location.hostname === '127.0.0.1'
               || location.protocol === 'file:';
  return isLocal ? 'http://127.0.0.1:3459/session/close' : '/api/session/close';
})();

const REVIEWS_STORAGE_KEY = 'reviews_log';
const REVIEWS_LIMIT = 50;

// 6 维度展示名（雷达图标签 + 复盘元数据）
const DIMENSION_LABELS = [
  ['cognitive',     '认知'],
  ['emotional',     '情感'],
  ['existential',   '存在'],
  ['relational',    '关系'],
  ['embodied',      '身体'],
  ['autonomy_tech', '自主·技术']
];

// 整体强度 → 文学化标签（不是分级评判，是回声）
function intensityNote(score) {
  if (score >= 80) return '尖叫得很响';
  if (score >= 60) return '在持续低鸣';
  if (score >= 40) return '有几处共振';
  if (score >= 20) return '若有若无';
  return '近乎静默';
}

// 拉取一条已存复盘
function loadReviewLog() {
  try { return JSON.parse(localStorage.getItem(REVIEWS_STORAGE_KEY) || '[]'); }
  catch { return []; }
}
function saveReviewLog(arr) {
  localStorage.setItem(REVIEWS_STORAGE_KEY, JSON.stringify(arr.slice(0, REVIEWS_LIMIT)));
}
function appendReview(entry) {
  const log = loadReviewLog();
  log.unshift(entry);   // 最新在前
  saveReviewLog(log);
}

/* ── 6 维雷达 SVG ──
   六角形 + 三圈刻度 + 数据多边形 + 维度标签
   颜色全部走 CSS 变量，跟产品调性一致 */
function renderRadar(dimensionScores) {
  const cx = 210, cy = 200, R = 130;
  const N = 6;
  // 起点顶（认知）顺时针：认知/情感/存在/关系/身体/自主·技术
  const angles = DIMENSION_LABELS.map((_, i) => -Math.PI/2 + (i * 2*Math.PI/N));

  const pt = (a, r) => `${(cx + Math.cos(a)*r).toFixed(1)},${(cy + Math.sin(a)*r).toFixed(1)}`;

  const outer = angles.map(a => pt(a, R)).join(' ');
  const rings = [0.25, 0.5, 0.75, 1.0].map((t, i) => {
    const pts = angles.map(a => pt(a, R*t)).join(' ');
    return `<polygon points="${pts}" fill="none" stroke="#D2CEC2" stroke-width="${i === 3 ? 0.9 : 0.5}" opacity="${i === 3 ? 0.9 : 0.5}"/>`;
  }).join('');

  const axes = angles.map(a =>
    `<line x1="${cx}" y1="${cy}" x2="${(cx + Math.cos(a)*R).toFixed(1)}" y2="${(cy + Math.sin(a)*R).toFixed(1)}" stroke="#D2CEC2" stroke-width="0.5"/>`
  ).join('');

  const dataPts = angles.map((a, i) => {
    const key = DIMENSION_LABELS[i][0];
    const t = Math.max(0, Math.min(1, dimensionScores[key] ?? 0));
    return pt(a, R*t);
  }).join(' ');

  const dataDots = angles.map((a, i) => {
    const key = DIMENSION_LABELS[i][0];
    const t = Math.max(0, Math.min(1, dimensionScores[key] ?? 0));
    return `<circle cx="${(cx + Math.cos(a)*R*t).toFixed(1)}" cy="${(cy + Math.sin(a)*R*t).toFixed(1)}" r="2.5" fill="#1B1B18"/>`;
  }).join('');

  const labelEls = angles.map((a, i) => {
    const lr = R + 28;
    const x = (cx + Math.cos(a)*lr).toFixed(1);
    const y = (cy + Math.sin(a)*lr).toFixed(1);
    const key = DIMENSION_LABELS[i][0];
    const zh  = DIMENSION_LABELS[i][1];
    const score = Math.round((dimensionScores[key] ?? 0) * 100);
    // anchor 适配位置
    let anchor = 'middle';
    if (Math.cos(a) > 0.3) anchor = 'start';
    else if (Math.cos(a) < -0.3) anchor = 'end';
    return `<text x="${x}" y="${y}" text-anchor="${anchor}" font-family="'EB Garamond',serif" font-size="11.5" letter-spacing="0.08em" fill="#5C5C52">${zh}</text>
            <text x="${x}" y="${(parseFloat(y)+14).toFixed(1)}" text-anchor="${anchor}" font-family="'Playfair Display',serif" font-style="italic" font-size="11" fill="#9C9C8E">${score}</text>`;
  }).join('');

  return `<svg viewBox="0 0 420 400" xmlns="http://www.w3.org/2000/svg">
    ${rings}
    ${axes}
    <polygon points="${dataPts}" fill="#1B1B18" fill-opacity="0.08" stroke="#1B1B18" stroke-width="1.4" stroke-linejoin="round"/>
    ${dataDots}
    ${labelEls}
  </svg>`;
}

/* ── POST /session/close ── */
async function fetchSummary(mentorId, messages) {
  // 可选：携带 Supabase access_token，便于后续服务端鉴权
  let authHeader = {};
  try {
    const { data: { session } } = await supa.auth.getSession();
    if (session?.access_token) authHeader = { 'Authorization': `Bearer ${session.access_token}` };
  } catch (_) { /* 离线/未登录都允许复盘 */ }

  const body = { mentor_id: mentorId, messages };
  if (Number.isInteger(currentSessionId)) body.session_id = currentSessionId;
  const res = await fetch(REVIEW_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', ...authHeader },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const errText = await res.text().catch(() => '');
    throw new Error(`复盘服务返回 ${res.status}: ${errText.slice(0, 120)}`);
  }
  return res.json();
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

function formatReviewDate(iso) {
  try {
    const d = iso ? new Date(iso) : new Date();
    return d.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' })
         + ' · ' + d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  } catch { return ''; }
}

/* ── 渲染 sceneTranscript（基于 currentReview.messages） ── */
function renderTranscript() {
  if (!currentReview) return;
  const d = P[currentReview.mentor_id] || {};
  document.getElementById('transcriptHeader').textContent =
    `与 ${d.short || currentReview.mentor_id} · ${formatReviewDate(currentReview.created_at)}`;

  const box = document.getElementById('transcriptContent');
  const msgs = currentReview.messages || [];
  // 按对（user, mentor）聚合
  const exchanges = [];
  for (let i = 0; i < msgs.length; i++) {
    const m = msgs[i];
    if (m.role === 'user') {
      const next = msgs[i + 1];
      exchanges.push({ user: m, mentor: (next && next.role === 'assistant') ? next : null });
      if (next && next.role === 'assistant') i++;
    } else {
      exchanges.push({ user: null, mentor: m });
    }
  }
  box.innerHTML = exchanges.map(ex => {
    const userBlock = ex.user ? `<p class="transcript-msg-user"><span class="transcript-role-tag">我</span>${escapeHtml(ex.user.content)}</p>` : '';
    const mentorBlock = ex.mentor ? `<p class="transcript-msg-mentor"><span class="transcript-role-tag">${d.short || '导师'}</span>${escapeHtml(ex.mentor.content)}</p>` : '';
    return `<div class="transcript-exchange">${userBlock}${mentorBlock}</div>`;
  }).join('');
}

/* ── 渲染 sceneHistory ── */
/* ══════════════════════════════════════════════════════
   sceneHistory：日历 + 信笺
   数据来源：/api/session/list（按 last_active_at 降序）
   分组依据：用户本地时区下的日期（YYYY-MM-DD）
══════════════════════════════════════════════════════ */
const WEEKDAY_LABELS = ['日','一','二','三','四','五','六'];

let _sessionsCache = [];          // 当前用户所有 sessions（按日期分组前）
let _sessionsByDay = new Map();   // dayKey 'YYYY-MM-DD' -> [session, ...]
let _calCursor = null;            // 当前月历光标，月初的 Date（本地时区）
let _selectedDay = null;          // 'YYYY-MM-DD'

function localDayKey(iso) {
  const d = new Date(iso);
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function formatTime(iso) {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function formatDayHeader(dayKey) {
  const [y, m, d] = dayKey.split('-').map(Number);
  const dt = new Date(y, m - 1, d);
  return `${m} 月 ${d} 日 · 周${WEEKDAY_LABELS[dt.getDay()]}`;
}

async function renderHistoryList() {
  const emptyEl = document.getElementById('historyEmpty');
  const calendarEl = document.querySelector('#sceneHistory .calendar');
  const daySectionEl = document.querySelector('#sceneHistory .day-section');

  // 1) 拉服务端列表
  try {
    const { sessions } = await apiGet('/api/session/list?limit=500');
    _sessionsCache = sessions || [];
  } catch (err) {
    console.warn('[history] list failed, 回退到本地复盘日志', err);
    _sessionsCache = loadReviewLog().map(r => ({
      id: `local-${r.created_at}-${r.mentor_id}`,
      mentor_id: r.mentor_id,
      started_at: r.created_at,
      last_active_at: r.created_at,
      status: 'closed_by_user',
      turn_count: Array.isArray(r.messages) ? r.messages.length : 0,
      has_summary: true,
      summary_pretty: r.overall_text || r.title || null,
      _local_review: r,
    }));
  }

  // 2) 按本地日期分组
  _sessionsByDay = new Map();
  for (const s of _sessionsCache) {
    const k = localDayKey(s.last_active_at);
    if (!_sessionsByDay.has(k)) _sessionsByDay.set(k, []);
    _sessionsByDay.get(k).push(s);
  }

  // 3) 全空：只显示导入按钮（如有），日历隐藏
  if (_sessionsCache.length === 0) {
    emptyEl.style.display = 'block';
    calendarEl.style.display = 'none';
    daySectionEl.style.display = 'none';
    await maybeOfferImport();
    return;
  }
  emptyEl.style.display = 'none';
  calendarEl.style.display = '';
  daySectionEl.style.display = '';

  // 4) 默认光标 = 最近一次对话所在月；默认选中那天
  if (!_calCursor) {
    const latest = new Date(_sessionsCache[0].last_active_at);
    _calCursor = new Date(latest.getFullYear(), latest.getMonth(), 1);
  }
  if (!_selectedDay) {
    _selectedDay = localDayKey(_sessionsCache[0].last_active_at);
  }

  renderCalendar();
  renderDayLetters();
  await maybeOfferImport();
}

function renderCalendar() {
  const label = document.getElementById('calLabel');
  const grid  = document.getElementById('calDays');
  const year  = _calCursor.getFullYear();
  const month = _calCursor.getMonth();

  label.textContent = `${year} 年 ${month + 1} 月`;

  const first = new Date(year, month, 1);
  const offset = first.getDay();
  const gridStart = new Date(year, month, 1 - offset);

  const todayKey = localDayKey(new Date().toISOString());
  const cells = [];
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + i);
    const k = localDayKey(d.toISOString());
    const inMonth = d.getMonth() === month;
    const isFuture = k > todayKey;
    const hasSessions = _sessionsByDay.has(k);
    const isToday = k === todayKey;
    const isSelected = k === _selectedDay;

    const classes = ['cal-day'];
    if (inMonth) classes.push('in-month');
    if (isFuture) classes.push('future');
    if (hasSessions && !isFuture) classes.push('has-sessions');
    if (isToday) classes.push('today');
    if (isSelected) classes.push('selected');

    cells.push(`<div class="${classes.join(' ')}" data-day="${k}">${d.getDate()}</div>`);
  }
  grid.innerHTML = cells.join('');

  grid.querySelectorAll('.cal-day.has-sessions').forEach(el => {
    el.addEventListener('click', () => {
      _selectedDay = el.dataset.day;
      const [y, m] = _selectedDay.split('-').map(Number);
      if (y !== _calCursor.getFullYear() || (m - 1) !== _calCursor.getMonth()) {
        _calCursor = new Date(y, m - 1, 1);
      }
      renderCalendar();
      renderDayLetters();
      // 矮屏兜底：把当天的信笺平滑滚到视野中央
      const daySection = document.querySelector('#sceneHistory .day-section');
      if (daySection) {
        daySection.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  });
}

function renderDayLetters() {
  const headerEl = document.getElementById('daySectionHeader');
  const listEl   = document.getElementById('dayLetters');
  const emptyEl  = document.getElementById('dayEmpty');

  if (!_selectedDay) {
    headerEl.textContent = '';
    listEl.innerHTML = '';
    emptyEl.style.display = 'none';
    return;
  }

  const items = (_sessionsByDay.get(_selectedDay) || [])
    .slice().sort((a, b) => new Date(b.last_active_at) - new Date(a.last_active_at));

  headerEl.innerHTML = `${formatDayHeader(_selectedDay)}
    <span class="day-section-sub">${items.length} 封信</span>`;

  if (items.length === 0) {
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  listEl.innerHTML = items.map((s, idx) => {
    const d = P[s.mentor_id] || {};
    const time = formatTime(s.last_active_at);
    const bodyText = s.summary_pretty
      ? escapeHtml(s.summary_pretty)
      : '<span>对话已记录，点开阅读</span>';
    const turnCount = s.turn_count ?? 0;
    const statusNote = s.status === 'active' ? '进行中' : `${turnCount} 轮`;

    return `<div class="letter" data-idx="${idx}">
      <div class="letter-time">${time}</div>
      <div class="letter-body ${s.summary_pretty ? '' : 'is-empty'}">${bodyText}</div>
      <div class="letter-foot">
        <span class="letter-signature">— ${escapeHtml(d.short || s.mentor_id)}</span>
        <span class="letter-meta">${statusNote}</span>
      </div>
    </div>`;
  }).join('');

  listEl.querySelectorAll('.letter').forEach(el => {
    el.addEventListener('click', async () => {
      const idx = parseInt(el.dataset.idx, 10);
      const s = items[idx];
      await openLetter(s);
    });
  });
}

async function openLetter(session) {
  // 本地兜底的复盘直接走旧 renderReview
  if (session._local_review) {
    renderReview(session._local_review);
    await go('sceneReview', 500);
    return;
  }
  // 服务端拉 turns，按是否有 summary 决定进 sceneReview 还是 sceneTranscript
  try {
    const data = await apiGet(`/api/session/turns?session_id=${session.id}`);
    const messages = (data.turns || []).map(t => ({
      role: t.role === 'mentor' ? 'assistant' : t.role,
      content: t.content,
    }));
    currentReview = {
      mentor_id:  data.session.mentor_id,
      created_at: data.session.last_active_at,
      messages,
      title: null,
      ...(data.session.summary || {}),
    };
    if (data.session.summary) {
      renderReview(currentReview);
      await go('sceneReview', 500);
    } else {
      renderTranscript();
      await go('sceneTranscript', 500);
    }
  } catch (err) {
    console.error('[history] openLetter failed', err);
    alert('未能打开这封信，请稍后再试');
  }
}

/* 月历翻页 */
document.getElementById('calPrev').addEventListener('click', () => {
  if (!_calCursor) return;
  _calCursor = new Date(_calCursor.getFullYear(), _calCursor.getMonth() - 1, 1);
  renderCalendar();
});
document.getElementById('calNext').addEventListener('click', () => {
  if (!_calCursor) return;
  const next = new Date(_calCursor.getFullYear(), _calCursor.getMonth() + 1, 1);
  const today = new Date();
  const thisMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  if (next > thisMonth) return;
  _calCursor = next;
  renderCalendar();
});

/* ══════════════════════════════════════════════════════
   一次性：导入本地 localStorage 历史到 Supabase
══════════════════════════════════════════════════════ */
const IMPORT_FLAG_KEY = 'local_imported_v1';

function localHistoryDigest() {
  const mentors = ['freud', 'weber', 'marx'];
  let convCount = 0, reviewCount = 0;
  for (const k of mentors) {
    try {
      const arr = JSON.parse(localStorage.getItem(`conv_${k}`) || '[]');
      if (Array.isArray(arr) && arr.length >= 2) convCount += 1;
    } catch (_) {}
  }
  try {
    const log = JSON.parse(localStorage.getItem('reviews_log') || '[]');
    if (Array.isArray(log)) reviewCount = log.length;
  } catch (_) {}
  return { convCount, reviewCount, total: convCount + reviewCount };
}

async function maybeOfferImport() {
  const btn = document.getElementById('importLocalBtn');
  if (!btn) return;
  if (localStorage.getItem(IMPORT_FLAG_KEY) === '1') {
    btn.style.display = 'none';
    return;
  }
  const { convCount, reviewCount, total } = localHistoryDigest();
  if (total === 0) {
    btn.style.display = 'none';
    return;
  }
  const bits = [];
  if (reviewCount > 0) bits.push(`${reviewCount} 段复盘`);
  if (convCount > 0)   bits.push(`${convCount} 段本地对话`);
  btn.textContent = `↑ 把本地的 ${bits.join(' + ')} 导入到云端`;
  btn.style.display = '';
}

function buildImportPayload() {
  const sessions = [];
  try {
    const log = JSON.parse(localStorage.getItem('reviews_log') || '[]');
    for (const r of log) {
      if (!Array.isArray(r.messages) || r.messages.length < 2) continue;
      if (!r.mentor_id) continue;
      const { messages, mentor_id, created_at, ...summary } = r;
      sessions.push({
        mentor_id,
        started_at:     created_at,
        last_active_at: created_at,
        closed_at:      created_at,
        summary,
        turns: messages.map(m => ({
          role: m.role === 'assistant' ? 'mentor' : m.role,
          content: m.content,
        })),
      });
    }
  } catch (_) {}

  for (const k of ['freud', 'weber', 'marx']) {
    try {
      const arr = JSON.parse(localStorage.getItem(`conv_${k}`) || '[]');
      if (!Array.isArray(arr) || arr.length < 2) continue;
      const now = new Date(Date.now() - 5 * 60 * 1000).toISOString();
      sessions.push({
        mentor_id: k,
        started_at:     now,
        last_active_at: now,
        closed_at:      now,
        turns: arr.map(m => ({
          role: m.role === 'assistant' ? 'mentor' : m.role,
          content: m.content,
        })),
      });
    } catch (_) {}
  }

  return sessions;
}

document.getElementById('importLocalBtn').addEventListener('click', async () => {
  const btn = document.getElementById('importLocalBtn');
  const sessions = buildImportPayload();
  if (sessions.length === 0) {
    btn.style.display = 'none';
    return;
  }
  if (!confirm(`要把这台设备上的 ${sessions.length} 段对话导入云端吗？\n（只会做一次；导入后本地仍保留作离线备份）`)) {
    return;
  }
  btn.disabled = true;
  btn.textContent = '正在导入……';
  try {
    const result = await apiPost('/api/session/import', { sessions });
    localStorage.setItem(IMPORT_FLAG_KEY, '1');
    btn.style.display = 'none';
    _sessionsCache = [];
    _sessionsByDay = new Map();
    _calCursor = null;
    _selectedDay = null;
    await renderHistoryList();
    alert(`已导入 ${result.imported} 段对话`);
  } catch (err) {
    console.error('[import] failed', err);
    btn.disabled = false;
    btn.textContent = '导入失败 · 点击重试';
    alert('导入失败：' + (err?.message || '请稍后再试'));
  }
});

/* ══════════════════════════════════════════════════════
   END SESSION → 生成复盘
══════════════════════════════════════════════════════ */
async function endSessionAndReview() {
  if (!curPhil || convHistory.length < 2) {
    // 太短的对话，没什么好复盘的
    alert('再多说几句吧，至少完整地聊上一两轮。');
    return;
  }
  document.getElementById('backBtn').style.display = 'none';

  // 进入 thinking 场景，加一行"我在回望……"
  const thinkingScene = document.getElementById('sceneThinking');
  let reviewingHint = thinkingScene.querySelector('.reviewing-hint');
  if (!reviewingHint) {
    reviewingHint = document.createElement('div');
    reviewingHint.className = 'reviewing-hint';
    reviewingHint.textContent = '我在回望……';
    thinkingScene.appendChild(reviewingHint);
  }
  reviewingHint.style.display = 'block';
  await go('sceneThinking', 380);

  let summary;
  try {
    summary = await fetchSummary(curPhil, convHistory);
  } catch (err) {
    reviewingHint.textContent = '复盘暂未完成 · ' + (err.message || '请稍后再试');
    setTimeout(() => {
      reviewingHint.textContent = '我在回望……';
      reviewingHint.style.display = 'none';
      document.getElementById('backBtn').style.display = 'block';
    }, 2500);
    await go('sceneResponse', 400);
    return;
  }
  reviewingHint.style.display = 'none';

  // 持久化
  const entry = {
    ...summary,
    mentor_id: curPhil,
    created_at: new Date().toISOString(),
    messages: [...convHistory]
  };
  appendReview(entry);

  // 结束本次对话历史（已沉淀到 review log，对话本身可以"清场"，回到"今日"留白）
  // 注：保留 conv_${philKey} 不动 —— 让用户可以选择"继续这段记忆"或"重新开始"。
  //     如果未来想强制每次结束=清场，可在此 clearHistory(curPhil)
  convHistory = [];
  sessionCount = 0;
  // 远端这条 session 已被 close.js 标记 closed_by_user；本地 id 也置空，下次重新 start
  currentSessionId = null;

  renderReview(entry);
  await go('sceneReview', 600);
}

/* ══════════════════════════════════════════════════════
   API KEY MANAGEMENT
══════════════════════════════════════════════════════ */
const keyModal  = document.getElementById('keyModal');
const keyInput  = document.getElementById('keyInput');
const keyStatus = document.getElementById('keyStatus');
const keyBtn    = document.getElementById('keyBtn');

function updateKeyUI() {
  if (DS.key) {
    keyStatus.textContent = '· Key 已设置';
    keyBtn.textContent = '更换';
  } else {
    keyStatus.textContent = '';
    keyBtn.textContent = '设置 Key';
  }
}

function openKeyModal() {
  keyInput.value = DS.key || '';
  keyModal.style.display = 'flex';
  setTimeout(() => keyInput.focus(), 50);
}

function closeKeyModal() {
  keyModal.style.display = 'none';
}

document.getElementById('keyBtn').addEventListener('click', openKeyModal);

document.getElementById('keySaveBtn').addEventListener('click', () => {
  const v = keyInput.value.trim().replace(/\s/g, '');
  if (v) { DS.key = v; updateKeyUI(); }
  closeKeyModal();
});

document.getElementById('keyCancelBtn').addEventListener('click', closeKeyModal);

keyInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('keySaveBtn').click();
  if (e.key === 'Escape') closeKeyModal();
});

// Init key UI
updateKeyUI();

// DeepSeek key modal 不再启动时直接弹 —— 由 bootstrapAuth() 在登录后决定

// Clear memory button
document.getElementById('clearMemBtn').addEventListener('click', () => {
  if (curPhil && confirm(`清除与${P[curPhil].short}的所有对话记忆？`)) {
    clearHistory(curPhil);
    convHistory = [];
    sessionCount = 0;
    document.getElementById('clearMemBtn').style.display = 'none';
  }
});

/* ══════════════════════════════════════════════════════
   AUTH (Supabase)
══════════════════════════════════════════════════════ */
const authForm     = document.getElementById('authForm');
const authEmail    = document.getElementById('authEmail');
const authPassword = document.getElementById('authPassword');
const authSubmit   = document.getElementById('authSubmit');
const authToggle   = document.getElementById('authToggle');
const authTitle    = document.getElementById('authTitle');
const authSub      = document.getElementById('authSub');
const authError    = document.getElementById('authError');
const authNote     = document.getElementById('authNote');
const userEmailEl  = document.getElementById('userEmail');
const signOutBtn   = document.getElementById('signOutBtn');

let authMode = 'signin';   // 'signin' | 'signup'

function setAuthMode(mode) {
  authMode = mode;
  authError.style.display = 'none';
  authNote.style.display  = 'none';
  if (mode === 'signin') {
    authTitle.textContent  = '回到对话';
    authSub.textContent    = '留下邮箱，思想者会在此等你';
    authSubmit.textContent = '进入';
    authToggle.textContent = '— 还没有账号？注册';
    authPassword.autocomplete = 'current-password';
  } else {
    authTitle.textContent  = '初次相见';
    authSub.textContent    = '一个邮箱，一段密码，便是你的所在';
    authSubmit.textContent = '注册';
    authToggle.textContent = '— 已经有账号？登录';
    authPassword.autocomplete = 'new-password';
  }
}

authToggle.addEventListener('click', () => {
  setAuthMode(authMode === 'signin' ? 'signup' : 'signin');
});

function showAuthError(msg) {
  authError.textContent  = msg;
  authError.style.display = 'block';
  authNote.style.display  = 'none';
}

function showAuthNote(msg) {
  authNote.textContent   = msg;
  authNote.style.display = 'block';
  authError.style.display = 'none';
}

authForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const email    = authEmail.value.trim();
  const password = authPassword.value;
  if (!email || !password) return;

  authSubmit.disabled = true;
  authError.style.display = 'none';
  authNote.style.display  = 'none';

  try {
    if (authMode === 'signin') {
      const { data, error } = await supa.auth.signInWithPassword({ email, password });
      if (error) throw error;
      // 登录成功，进入主流程
      await onSignedIn(data.user);
    } else {
      const { data, error } = await supa.auth.signUp({
        email, password,
        options: { emailRedirectTo: window.location.origin + window.location.pathname }
      });
      if (error) throw error;
      // 若项目开启了"邮箱确认"，session 为 null —— 提示去邮箱确认
      if (!data.session) {
        showAuthNote('已向你的邮箱发送确认链接，点击链接后再来登录');
        setAuthMode('signin');
      } else {
        await onSignedIn(data.user);
      }
    }
  } catch (err) {
    showAuthError(err?.message || '操作失败，请稍后再试');
  } finally {
    authSubmit.disabled = false;
  }
});

async function onSignedIn(user) {
  userEmailEl.textContent = user.email;
  userEmailEl.style.display = 'inline';
  signOutBtn.style.display  = 'inline-block';
  authError.style.display   = 'none';
  authNote.style.display    = 'none';
  authPassword.value = '';
  // 从 auth 场景过渡到 select；其它场景直接停在 auth 才会进入这里
  if (curScene === 'sceneAuth' || curScene === null) {
    await go('sceneSelect', 500);
  }
  // DeepSeek key 现由服务端持有，不再弹 key 弹窗
}

signOutBtn.addEventListener('click', async () => {
  await supa.auth.signOut();
  // 清理与本会话相关的瞬时状态（不动 localStorage 里的对话历史，因它按 philKey 隔离）
  curPhil = null;
  convHistory = [];
  sessionCount = 0;
  currentSessionId = null;
  userEmailEl.style.display = 'none';
  userEmailEl.textContent   = '';
  signOutBtn.style.display  = 'none';
  document.getElementById('clearMemBtn').style.display = 'none';
  document.getElementById('backBtn').style.display     = 'none';
  closeKeyModal();
  setAuthMode('signin');
  authEmail.value = '';
  authPassword.value = '';
  await go('sceneAuth', 400);
});

// 跨标签页同步登出 / token 刷新
supa.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_OUT' && curScene !== 'sceneAuth') {
    // 别的标签页登出了 —— 强制回到 auth
    userEmailEl.style.display = 'none';
    signOutBtn.style.display  = 'none';
    go('sceneAuth', 400);
  }
});

/* ══════════════════════════════════════════════════════
   BOOTSTRAP — 决定首屏：有 session 进 select，无 session 进 auth
══════════════════════════════════════════════════════ */
(async function bootstrapAuth() {
  setAuthMode('signin');
  try {
    const { data: { session } } = await supa.auth.getSession();
    if (session?.user) {
      userEmailEl.textContent   = session.user.email;
      userEmailEl.style.display = 'inline';
      signOutBtn.style.display  = 'inline-block';
      await go('sceneSelect', 0);
    } else {
      await go('sceneAuth', 0);
      setTimeout(() => authEmail.focus(), 100);
    }
  } catch (err) {
    console.error('[auth] bootstrap failed', err);
    await go('sceneAuth', 0);
    showAuthError('未能连接到 Supabase，请检查页面顶部的 SUPA_URL / SUPA_ANON_KEY 配置');
  }
})();
</script>
